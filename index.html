<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="純前端證件圖片浮水印工具，圖片只在瀏覽器本地處理。"
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>證件圖片浮水印工具</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%23008579' d='M8 1 14 3.4v4.7c0 3.8-2.4 6.2-6 7.4-3.6-1.2-6-3.6-6-7.4V3.4L8 1Z'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css?v=20260625" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header" aria-label="頁首">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 56" role="img">
              <path
                d="M24 3 42 10v14c0 13.5-7.3 22.9-18 28.5C13.3 46.9 6 37.5 6 24V10L24 3Z"
                fill="none"
                stroke="currentColor"
                stroke-width="4"
                stroke-linejoin="round"
              />
              <path d="m14 35 21-21M16 45l22-22M12 25l15-15" />
            </svg>
          </span>
          <div>
            <h1>證件圖片浮水印工具</h1>
            <p>快速替證件、文件同申請截圖加上用途限定浮水印。</p>
          </div>
        </div>

        <aside class="privacy-note" aria-label="隱私提示">
          <span class="privacy-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 3 19 6v5c0 5.2-2.8 8.9-7 11-4.2-2.1-7-5.8-7-11V6l7-3Z" />
              <path d="m9 12 2 2 4-5" />
            </svg>
          </span>
          <span>圖片只會在你的瀏覽器本地處理，不會上傳到伺服器。</span>
        </aside>
      </header>

      <main class="workspace">
        <section class="controls-panel" aria-label="圖片與浮水印設定">
          <section class="panel-section upload-section" id="uploadSection">
            <div class="section-title">
              <span class="section-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 16V4" />
                  <path d="m7 9 5-5 5 5" />
                  <path d="M20 16.5A4.5 4.5 0 0 0 15.5 12H15a6 6 0 0 0-11.7 1.9" />
                  <path d="M16 16h2a3 3 0 0 1 0 6H6a3 3 0 1 1 0-6h1" />
                </svg>
              </span>
              <h2>上傳圖片</h2>
            </div>

            <label class="upload-area" id="uploadArea" for="fileInput">
              <input type="file" id="fileInput" accept="image/*" />
              <span class="upload-symbol" aria-hidden="true">
                <svg viewBox="0 0 32 32">
                  <path d="M16 22V8" />
                  <path d="m10 14 6-6 6 6" />
                  <path d="M25 22.5A5.5 5.5 0 0 0 19.5 17H19a7 7 0 0 0-13.7 2.1" />
                  <path d="M22 22h2.5a3.5 3.5 0 0 1 0 7h-17a3.5 3.5 0 1 1 0-7H10" />
                </svg>
              </span>
              <span class="upload-copy">拖放圖片到此處，或點擊選擇圖片</span>
              <span class="upload-hint">支援 JPG、PNG、WEBP、GIF、BMP、SVG 等瀏覽器可解碼格式</span>
            </label>
          </section>

          <section class="panel-section settings-section" aria-label="浮水印設定">
            <div class="section-title">
              <span class="section-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
                  <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.3a2 2 0 0 1-4 0V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 0 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H2.7a2 2 0 0 1 0-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 0 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V2.7a2 2 0 0 1 4 0V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 0 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.3a2 2 0 0 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z" />
                </svg>
              </span>
              <h2>浮水印設定</h2>
            </div>

            <div class="field">
              <label for="watermarkText">浮水印文字</label>
              <input
                type="text"
                id="watermarkText"
                value="僅供證明使用"
                autocomplete="off"
                disabled
              />
            </div>

            <div class="range-field">
              <label for="fontSize">文字大小</label>
              <input type="range" id="fontSize" min="8" max="200" value="32" disabled />
              <output id="fontSizeValue" for="fontSize">32 px</output>
            </div>

            <div class="range-field">
              <label for="gapX">水平間距</label>
              <input type="range" id="gapX" min="20" max="500" value="120" disabled />
              <output id="gapXValue" for="gapX">120 px</output>
            </div>

            <div class="range-field">
              <label for="gapY">垂直間距</label>
              <input type="range" id="gapY" min="20" max="500" value="100" disabled />
              <output id="gapYValue" for="gapY">100 px</output>
            </div>

            <div class="range-field">
              <label for="opacity">透明度</label>
              <input type="range" id="opacity" min="0" max="100" value="20" disabled />
              <output id="opacityValue" for="opacity">20%</output>
            </div>

            <div class="range-field">
              <label for="rotation">旋轉角度</label>
              <input type="range" id="rotation" min="-90" max="90" value="-30" disabled />
              <output id="rotationValue" for="rotation">-30°</output>
            </div>

            <div class="color-field">
              <label for="color">文字顏色</label>
              <input type="color" id="color" value="#999999" disabled />
              <output id="colorValue" for="color">#999999</output>
            </div>

            <div class="range-field">
              <label for="jpgQuality">JPG 品質</label>
              <input
                type="range"
                id="jpgQuality"
                min="0.1"
                max="1"
                step="0.01"
                value="0.92"
                disabled
              />
              <output id="jpgQualityValue" for="jpgQuality">0.92</output>
            </div>

            <button class="button button-secondary button-full" id="resetSettings" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7" />
                <path d="M3 4v6h6" />
              </svg>
              重設設定
            </button>
          </section>
        </section>

        <section class="preview-panel" aria-label="即時圖片預覽">
          <div class="preview-header">
            <div class="section-title">
              <span class="section-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <rect x="3" y="5" width="18" height="14" rx="2" />
                  <path d="m8 13 2.5-2.5L14 14l2-2 3 3" />
                  <circle cx="8.5" cy="9" r="1.5" />
                </svg>
              </span>
              <h2>即時預覽</h2>
            </div>
            <p id="imageMeta" class="image-meta">等待匯入圖片</p>
          </div>

          <div class="error-message" id="errorMessage" role="alert" aria-live="polite"></div>

          <div class="canvas-wrap" id="canvasWrap">
            <canvas id="previewCanvas" aria-label="浮水印圖片預覽"></canvas>
            <div class="empty-preview" id="emptyPreview">
              <span class="empty-icon" aria-hidden="true">
                <svg viewBox="0 0 48 48">
                  <rect x="7" y="10" width="34" height="26" rx="4" />
                  <path d="m14 29 6-6 7 7 4-4 5 5" />
                  <circle cx="17" cy="18" r="2.5" />
                </svg>
              </span>
              <strong>請先匯入圖片</strong>
              <span>匯入後會即時顯示原圖解析度嘅 Canvas 預覽。</span>
            </div>
          </div>

          <div class="download-actions" aria-label="圖片下載">
            <button class="button button-secondary" id="resetSettingsPreview" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7" />
                <path d="M3 4v6h6" />
              </svg>
              重設設定
            </button>
            <button class="button button-primary" id="downloadPng" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
              下載 PNG
            </button>
            <button class="button button-accent" id="downloadJpg" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
              下載 JPG
            </button>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js?v=20260625"></script>
  </body>
</html>
